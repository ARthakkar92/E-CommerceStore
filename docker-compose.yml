services:

  mongodb:
    image: mongo:4.4
    container_name: mongodb
    ports:
      - "27017:27017"

  user-service:
    build: ./backend/user-service
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce_users
      - JWT_SECRET=secret123
    depends_on:
      - mongodb

  product-service:
    build: ./backend/product-service
    ports:
      - "3002:3002"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce_products
    depends_on:
      - mongodb

  cart-service:
    build: ./backend/cart-service
    ports:
      - "3003:3003"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce_carts
      - PRODUCT_SERVICE_URL=http://product-service:3002
    depends_on:
      - mongodb

  order-service:
    build: ./backend/order-service
    ports:
      - "3004:3004"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce_orders
      - CART_SERVICE_URL=http://cart-service:3003
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - USER_SERVICE_URL=http://user-service:3001
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_USER_SERVICE_URL=http://user-service:3001
      - REACT_APP_PRODUCT_SERVICE_URL=http://product-service:3002
      - REACT_APP_CART_SERVICE_URL=http://cart-service:3003
      - REACT_APP_ORDER_SERVICE_URL=http://order-service:3004
